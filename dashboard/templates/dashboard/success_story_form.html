<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أضف قصتك - نظام متابعة الخريجين</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .form-group { margin-bottom: 1rem; }
        label { font-weight: 600; margin-bottom: 0.3rem; display: block; }
        input, textarea, select { width: 100%; padding: 0.5rem; border-radius: 0.5rem; border: 1px solid #ced4da; }
        button { margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0 rounded-4">
                    <div class="card-header bg-primary text-white text-center py-3 rounded-top-4">
                        <h4 class="mb-0"><i class="fas fa-star"></i> شارك قصتك الملهمة</h4>
                    </div>
                    <div class="card-body p-4">
                        <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                            {% for field in form %}
                            <div class="form-group mb-3">
                                {{ field.label_tag }}
                                {{ field }}
                                {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                                {% endif %}
                            </div>
                            {% endfor %}
                            <div class="alert alert-info small">
                                <i class="fas fa-info-circle"></i> سيتم مراجعة قصتك قبل النشر.
                            </div>
                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-success flex-grow-1">إرسال القصة</button>
                                <a href="{% url 'home' %}" class="btn btn-secondary flex-grow-1">إلغاء</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

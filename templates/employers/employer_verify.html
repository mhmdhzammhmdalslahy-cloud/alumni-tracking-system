<!DOCTYPE html>
{% load i18n %}
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طلب توثيق الشركة - نظام متابعة الخريجين</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #f5f7fa, #e4e8f0); }
        .verify-card { background: white; border-radius: 25px; padding: 35px; max-width: 600px; margin: 50px auto; }
        .btn-verify { background: linear-gradient(135deg, #1A5F7A, #0d3b4f); color: white; border-radius: 50px; padding: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="verify-card">
        <div class="text-center mb-4">
            <i class="fas fa-shield-alt fa-3x text-primary"></i>
            <h3>طلب توثيق الشركة</h3>
            <p>{{ employer.company_name }}</p>
        </div>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">السجل التجاري</label>
                {{ form.commercial_registration_file }}
            </div>
            <div class="mb-3">
                <label class="form-label">شهادة الضريبة (اختياري)</label>
                {{ form.tax_certificate }}
            </div>
            <button type="submit" class="btn btn-verify w-100">إرسال طلب التوثيق</button>
        </form>
    </div>
</div>
</body>
</html>

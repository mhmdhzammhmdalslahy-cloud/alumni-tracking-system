<!DOCTYPE html>
{% load i18n %}
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قبول الطلب - {{ application.graduate.user.get_full_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-success text-white">
            <h4><i class="fas fa-check-circle"></i> قبول الطلب و{% trans "إرسال" %} عرض وظيفي</h4>
        </div>
        <div class="card-body">
            <h5>{{ application.graduate.user.get_full_name }}</h5>
            <p>{{ application.job.title }} - {{ application.job.employer.company_name }}</p>
            <hr>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label>رسالة العرض الوظيفي</label>
                    <textarea name="offer_message" class="form-control" rows="4" placeholder="نص العرض الوظيفي..."></textarea>
                </div>
                <div class="mb-3">
                    <label>الراتب المعروض (ريال)</label>
                    <input type="number" name="salary_offered" class="form-control" placeholder="مثال: 5000">
                </div>
                <div class="d-flex gap-2">
                    <a href="{% url 'employer_profile' application.job.employer.pk %}" class="btn btn-secondary">{% trans "إلغاء" %}</a>
                    <button type="submit" class="btn btn-success">{% trans "إرسال" %} العرض وقبول الطلب</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>

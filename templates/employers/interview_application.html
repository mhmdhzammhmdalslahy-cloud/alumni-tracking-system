<!DOCTYPE html>
{% load i18n %}
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تحديد مقابلة - {{ application.graduate.user.get_full_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-info text-white">
            <h4><i class="fas fa-calendar-alt"></i> تحديد مقابلة شخصية</h4>
        </div>
        <div class="card-body">
            <h5>{{ application.graduate.user.get_full_name }}</h5>
            <p>{{ application.job.title }} - {{ application.job.employer.company_name }}</p>
            <hr>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label>تاريخ ووقت المقابلة</label>
                    <input type="datetime-local" name="interview_date" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>رابط المقابلة (Google Meet / Zoom)</label>
                    <input type="url" name="interview_link" class="form-control" placeholder="https://meet.google.com/...">
                </div>
                <div class="mb-3">
                    <label>ملاحظات إضافية</label>
                    <textarea name="interview_notes" class="form-control" rows="3" placeholder="تعليمات المقابلة..."></textarea>
                </div>
                <div class="d-flex gap-2">
                    <a href="{% url 'employer_profile' application.job.employer.pk %}" class="btn btn-secondary">إلغاء</a>
                    <button type="submit" class="btn btn-info">تحديد المقابلة وإشعار الخريج</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>

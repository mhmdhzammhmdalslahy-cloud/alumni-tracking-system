<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موضوع جديد - {{ group.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-graduation-cap"></i> نظام متابعة الخريجين</a>
        </div>
    </nav>

    <div class="container my-4">
        <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 800px;">
            <div class="card-header bg-primary text-white text-center py-3">
                <h4 class="mb-0"><i class="fas fa-comment"></i> موضوع جديد في {{ group.name }}</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">عنوان الموضوع <span class="text-danger">*</span></label>
                        <input type="text" name="title" class="form-control" required placeholder="مثال: اقتراحات لتطوير المهارات">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">المحتوى <span class="text-danger">*</span></label>
                        <textarea name="content" class="form-control" rows="6" required placeholder="اكتب موضوعك هنا..."></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success flex-grow-1">نشر الموضوع</button>
                        <a href="{% url 'groups:topic_list' group.id %}" class="btn btn-secondary flex-grow-1">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

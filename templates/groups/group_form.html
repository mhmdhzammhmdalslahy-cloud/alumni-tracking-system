<!DOCTYPE html>
{% load i18n %}
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء مجموعة جديدة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-header bg-primary text-white text-center rounded-top-4 py-3">
                        <h4 class="mb-0"><i class="fas fa-users"></i> إنشاء مجموعة جديدة</h4>
                    </div>
                    <div class="card-body p-4">
                        <form method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label fw-bold">اسم المجموعة <span class="text-danger">*</span></label>
                                <input type="text" name="name" class="form-control" required>
                                <div class="form-text text-muted">اسم فريد للمجموعة (لا يمكن تكراره)</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">الوصف</label>
                                <textarea name="description" class="form-control" rows="3"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">الفئة</label>
                                <input type="text" name="category" class="form-control" placeholder="مثال: تقنية معلومات، دفعة 2024">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">صورة الغلاف (اختياري)</label>
                                <input type="file" name="image" class="form-control" accept="image/*">
                            </div>
                            <div class="alert alert-info small">
                                <i class="fas fa-info-circle"></i> سيتم مراجعة طلبك من قبل الإدارة قبل الموافقة على المجموعة.
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary flex-grow-1 py-2 fw-bold">إنشاء المجموعة</button>
                                <a href="{% url 'groups:group_list' %}" class="btn btn-outline-secondary flex-grow-1 py-2 fw-bold">إلغاء</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

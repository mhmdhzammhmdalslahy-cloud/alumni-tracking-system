<!DOCTYPE html>
{% load i18n %}
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>التحقق بالرقم الجامعي - {% trans "نظام متابعة الخريجين" %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1A5F7A, #0d3b4f);
            min-height: 100vh;
        }
        .verify-card {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 500px;
            margin: 50px auto;
        }
        .btn-verify {
            background: linear-gradient(135deg, #1A5F7A, #0d3b4f);
            color: white;
            border-radius: 50px;
            padding: 12px;
            font-weight: bold;
        }
        .btn-verify:hover {
            background: #F39C12;
            color: #1A5F7A;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="verify-card">
        <div class="text-center mb-4">
            <i class="fas fa-graduation-cap fa-3x" style="color: #1A5F7A;"></i>
            <h3 class="mt-3">التحقق بالرقم الجامعي</h3>
            <p class="text-muted">يرجى إدخال بياناتك للتحقق من هويتك</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">الرقم الجامعي</label>
                <input type="text" name="university_id" class="form-control" placeholder="أدخل الرقم الجامعي" required>
                <small class="text-muted">مثال: 2025123456</small>
            </div>
            <div class="mb-3">
                <label class="form-label">الاسم الكامل</label>
                <input type="text" name="full_name" class="form-control" placeholder="أدخل اسمك كاملاً" required>
            </div>
            <div class="mb-3">
                <label class="form-label">سنة التخرج</label>
                <select name="graduation_year" class="form-select" required>
                    <option value="">اختر سنة التخرج</option>
                    <option>2025</option>
                    <option>2024</option>
                    <option>2023</option>
                    <option>2022</option>
                    <option>2021</option>
                </select>
            </div>
            <button type="submit" class="btn btn-verify w-100">
                <i class="fas fa-check-circle"></i> تحقق من الرقم الجامعي
            </button>
        </form>
        
        <hr>
        <div class="text-center mt-3">
            <a href="{% url 'graduate_list' %}" class="text-decoration-none">← العودة إلى {% trans "الخريجين" %}</a>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
{% load i18n %}
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حذف الملف الشخصي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 500px;">
        <div class="card-header bg-danger text-white">
            <h4 class="mb-0">تأكيد الحذف</h4>
        </div>
        <div class="card-body text-center">
            <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
            <p>هل أنت متأكد من حذف ملفك الشخصي؟</p>
            <p class="text-muted">هذا الإجراء لا يمكن التراجع عنه</p>
            <form method="post">
                {% csrf_token %}
                <a href="{% url 'graduate_profile' graduate.pk %}" class="btn btn-secondary">إلغاء</a>
                <button type="submit" class="btn btn-danger">نعم، احذف</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>

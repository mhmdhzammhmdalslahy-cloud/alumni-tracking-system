<!-- زر الدردشة العائم -->
<div id="chatWidget" style="position: fixed; bottom: 90px; right: 20px; z-index: 1050;">
    <button id="chatToggle" class="btn btn-primary rounded-circle shadow-lg" style="width: 55px; height: 55px; background: #1A5F7A; border: none;">
        <i class="fas fa-comment-dots fa-2x"></i>
    </button>
    <div id="chatBox" style="display: none; position: absolute; bottom: 70px; right: 0; width: 300px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; direction: rtl;">
        <div class="p-3" style="background: #1A5F7A; color: white;">
            <h6 class="mb-0"><i class="fas fa-robot"></i> المساعد الذكي</h6>
        </div>
        <div id="chatMessages" class="p-3" style="height: 300px; overflow-y: auto; background: #f8f9fa;">
            <div class="mb-2 text-muted small">مرحباً! كيف يمكنني مساعدتك؟</div>
        </div>
        <div class="p-2 border-top">
            <div class="input-group">
                <input type="text" id="chatInput" class="form-control" placeholder="اكتب سؤالك...">
                <button id="chatSend" class="btn btn-primary">إرسال</button>
            </div>
        </div>
    </div>
</div>

<script>
    // تشغيل/إيقاف الدردشة
    const toggleBtn = document.getElementById('chatToggle');
    const chatBox = document.getElementById('chatBox');
    toggleBtn.addEventListener('click', () => {
        chatBox.style.display = chatBox.style.display === 'none' ? 'block' : 'none';
    });

    // إرسال الرسالة ومعالجة الرد
    const sendBtn = document.getElementById('chatSend');
    const input = document.getElementById('chatInput');
    const messagesDiv = document.getElementById('chatMessages');

    function addMessage(text, isUser = true) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `mb-2 ${isUser ? 'text-end' : 'text-start'}`;
        msgDiv.innerHTML = `<span class="badge ${isUser ? 'bg-primary' : 'bg-secondary'} p-2" style="white-space: normal; text-align: right;">${text}</span>`;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    sendBtn.addEventListener('click', async () => {
        const message = input.value.trim();
        if (!message) return;
        addMessage(message, true);
        input.value = '';
        try {
            const response = await fetch("/chatbot/api/", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            addMessage(data.answer, false);
        } catch (error) {
            addMessage("حدث خطأ في الاتصال. حاول مرة أخرى.", false);
        }
    });

    // إرسال الرسالة بالضغط على Enter
    input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendBtn.click();
        }
    });
</script>

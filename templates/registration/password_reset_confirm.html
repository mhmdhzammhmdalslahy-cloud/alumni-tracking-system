<!DOCTYPE html>
{% load i18n %}
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة تعيين كلمة المرور</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#1A5F7A 0%,#0d3b4f 50%,#0a2e3f 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.reset-card{background:rgba(255,255,255,0.95);border-radius:25px;padding:40px 35px;box-shadow:0 25px 50px rgba(0,0,0,0.3);max-width:420px;width:100%}
.reset-card h3{font-weight:800;color:#1A5F7A;text-align:center}
.form-control{border-radius:50px;padding:12px 20px;border:2px solid #e9ecef;background:#f8f9fa;text-align:right;margin-bottom:15px;width:100%}
.form-control:focus{border-color:#1A5F7A;box-shadow:0 0 0 4px rgba(26,95,122,0.12);background:white}
.btn-reset{background:linear-gradient(135deg,#1A5F7A,#0d3b4f);color:white;border:none;border-radius:50px;padding:14px;font-weight:700;width:100%;transition:0.3s}
.btn-reset:hover{background:linear-gradient(135deg,#F39C12,#e67e22);color:#1A5F7A}
.alert{border-radius:12px;margin-bottom:15px}
</style>
</head>
<body>
<div class="container"><div class="reset-card">
<h3>{% trans "إعادة تعيين كلمة المرور" %}</h3>
{% if validlink %}
<form method="post">{% csrf_token %}
<input type="password" name="new_password1" class="form-control" placeholder="{% trans 'كلمة المرور الجديدة' %}" required>
<input type="password" name="new_password2" class="form-control" placeholder="{% trans 'تأكيد كلمة المرور' %}" required>
<button type="submit" class="btn-reset">{% trans "تغيير كلمة المرور" %}</button>
</form>
{% else %}
<div class="alert alert-danger">{% trans "الرابط غير صالح. يرجى طلب إعادة تعيين جديدة." %}</div>
{% endif %}
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

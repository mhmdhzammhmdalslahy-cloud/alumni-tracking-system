<!DOCTYPE html>
{% load i18n %}
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم التغيير</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#1A5F7A 0%,#0d3b4f 50%,#0a2e3f 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.success-card{background:rgba(255,255,255,0.95);border-radius:25px;padding:40px 35px;box-shadow:0 25px 50px rgba(0,0,0,0.3);max-width:420px;width:100%;text-align:center}
.success-icon{width:80px;height:80px;background:linear-gradient(135deg,#27ae60,#2ecc71);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-size:35px;color:white}
.success-card h3{font-weight:800;color:#1A5F7A}
.success-card p{color:#6c757d;font-size:14px}
.btn-primary{background:linear-gradient(135deg,#1A5F7A,#0d3b4f);color:white;border:none;border-radius:50px;padding:12px 35px;font-weight:700;transition:0.3s;text-decoration:none;display:inline-block;margin-top:15px}
.btn-primary:hover{background:linear-gradient(135deg,#F39C12,#e67e22);color:#1A5F7A}
</style>
</head>
<body>
<div class="container"><div class="success-card">
<div class="success-icon"><i class="fas fa-check-circle"></i></div>
<h3>{% trans "تم تغيير كلمة المرور بنجاح" %}</h3>
<p>{% trans "يمكنك الآن تسجيل الدخول بكلمة المرور الجديدة." %}</p>
<a href="{% url 'login' %}" class="btn-primary">{% trans "تسجيل الدخول" %}</a>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
{% load i18n %}
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل دخول - نظام متابعة الخريجين</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1A5F7A, #0d3b4f);
            min-height: 100vh;
            font-family: 'Cairo', sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 450px;
            margin: 100px auto;
        }
        .btn-login {
            background: linear-gradient(135deg, #1A5F7A, #0d3b4f);
            color: white;
            border-radius: 50px;
            padding: 12px;
            font-weight: bold;
        }
        .btn-login:hover {
            background: #F39C12;
            color: #1A5F7A;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="fas fa-graduation-cap fa-3x" style="color: #1A5F7A;"></i>
            <h3 class="mt-3">تسجيل دخول</h3>
            <p class="text-muted">مرحباً بعودتك</p>
        </div>
        
        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">اسم المستخدم</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">كلمة المرور</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-login w-100">دخول</button>
        </form>
        <hr>
        <div class="text-center">
            <a href="{% url 'register' %}">ليس لديك حساب؟ سجل الآن</a>
        </div>
    </div>
</div>
</body>
</html>

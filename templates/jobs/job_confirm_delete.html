<!DOCTYPE html>
{% load i18n %}
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حذف وظيفة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 500px;">
        <div class="card-header bg-danger text-white"><h4>تأكيد الحذف</h4></div>
        <div class="card-body text-center">
            <p>هل أنت متأكد من حذف وظيفة "{{ job.title }}"؟</p>
            <form method="post">
                {% csrf_token %}
                <a href="{% url 'jobs:job_detail' job.pk %}" class="btn btn-secondary">إلغاء</a>
                <button type="submit" class="btn btn-danger">نعم، احذف</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
